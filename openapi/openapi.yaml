components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: nervum_session
      description: Session ID (UUID) set by login/register/accept-invitation

  parameters:
    UUIDPathId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request (e.g. validation error)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    AuthRegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [admin, manager, member]
        organization_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserCreate:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [admin, manager, member]
        organization_id:
          type: string
          format: uuid

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        organization_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [admin, manager, member]

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        website:
          type: string
        owner_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OrganizationCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        website:
          type: string

    OrganizationUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        website:
          type: string

    Team:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TeamResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/Team'
        - type: object
          properties:
            environment_ids:
              type: array
              items:
                type: string
                format: uuid

    TeamCreate:
      type: object
      required: [organization_id, name]
      properties:
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
        environment_ids:
          type: array
          items:
            type: string
            format: uuid

    TeamUpdate:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string
        environment_ids:
          type: array
          items:
            type: string
            format: uuid

    UserTeam:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        role:
          type: string
        created_at:
          type: string
          format: date-time

    UserTeamCreate:
      type: object
      required: [user_id, team_id]
      properties:
        user_id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        role:
          type: string

    Invitation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        token:
          type: string
        email:
          type: string
        organization_id:
          type: string
          format: uuid
        invited_by_id:
          type: string
          format: uuid
        role:
          type: string
        environment_id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, accepted, expired]
        accepted_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        teams:
          type: array
          items:
            type: object

    InvitationCreate:
      type: object
      required: [email, team_ids]
      properties:
        email:
          type: string
          format: email
        team_ids:
          type: array
          items:
            type: string
            format: uuid
        environment_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [admin, manager, member]

    InvitationCreateResponse:
      type: object
      properties:
        invitation:
          $ref: '#/components/schemas/Invitation'
        invite_url:
          type: string
        token:
          type: string

    InvitationByTokenResponse:
      type: object
      properties:
        email:
          type: string
        organization_id:
          type: string
        organization_name:
          type: string
        team_ids:
          type: array
          items:
            type: string
        environment_id:
          type: string
        role:
          type: string
        expires_at:
          type: string
          format: date-time

    InvitationAcceptRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
        name:
          type: string
        password:
          type: string
          minLength: 8
          description: Required for new users; min 8 characters

    Environment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [healthy, warning, critical]
        created_at:
          type: string
          format: date-time

    EnvironmentResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/Environment'
        - type: object
          properties:
            services_count:
              type: integer
              description: Number of entities (services) in this environment

    EnvironmentCreate:
      type: object
      required: [organization_id, name]
      properties:
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [healthy, warning, critical]

    EnvironmentUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [healthy, warning, critical]

    Entity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        environment_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [service, database, infra, team, roadmap, cost, metric]
        name:
          type: string
        status:
          type: string
          enum: [healthy, warning, critical]
        owner_team_id:
          type: string
          format: uuid
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Relationship:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        from_entity_id:
          type: string
          format: uuid
        to_entity_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [depends_on, owned_by, runs_on, stores_data_in, generates_cost, monitored_by]
        metadata:
          type: object
        created_at:
          type: string
          format: date-time

    UserEnvironmentAccess:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        environment_id:
          type: string
          format: uuid
        role:
          type: string
        created_at:
          type: string
          format: date-time

security:
  - cookieAuth: []
