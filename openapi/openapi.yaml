  /api/v1/user-teams:
    post:
      tags: [User Teams]
      summary: Add user to team
      security: [{ cookieAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserTeamCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTeam'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags: [User Teams]
      summary: List user-team links
      security: [{ cookieAuth: [] }]
      parameters:
        - name: user_id
          in: query
          description: Filter by user (provide user_id OR team_id)
          schema:
            type: string
            format: uuid
        - name: team_id
          in: query
          description: Filter by team (provide user_id OR team_id)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserTeam'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [User Teams]
      summary: Remove user from team
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, team_id]
              properties:
                user_id:
                  type: string
                  format: uuid
                team_id:
                  type: string
                  format: uuid
      responses:
        '204':
          description: Removed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/invitations:
    post:
      tags: [Invitations]
      summary: Create invitation
      security: [{ cookieAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags: [Invitations]
      summary: List invitations
      security: [{ cookieAuth: [] }]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, expired]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invitation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/invitations/{id}:
    delete:
      tags: [Invitations]
      summary: Delete invitation
      security: [{ cookieAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/UUIDPathId'
      responses:
        '204':
          description: Deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/invitations/by-token/{token}:
    get:
      tags: [Invitations]
      summary: Get invitation by token (public)
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationByTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Invitation not found or expired
        '410':
          description: Invitation already used or expired
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/invitations/accept:
    post:
      tags: [Invitations]
      summary: Accept invitation (public)
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
      responses:
        '200':
          description: Existing user; session started
          headers:
            Set-Cookie:
              description: Session cookie (nervum_session)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '201':
          description: New user created; session started
          headers:
            Set-Cookie:
              description: Session cookie (nervum_session)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Invitation not found or expired
        '409':
          description: Invitation already used
        '410':
          description: Invitation expired
        '500':
          $ref: '#/components/responses/InternalError'

