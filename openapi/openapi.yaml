      security: [{ cookieAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEnvironmentAccess'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvironmentAccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags: [User Environment Access]
      summary: List user-environment access
      security: [{ cookieAuth: [] }]
      parameters:
