        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [Teams]
      summary: Update team
      security: [{ cookieAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/UUIDPathId'
      requestBody:
        content:
          application/json:
