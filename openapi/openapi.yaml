        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags: [Relationships]
      summary: List relationships
      security: [{ cookieAuth: [] }]
      parameters:
        - name: organization_id
          in: query
          required: true
