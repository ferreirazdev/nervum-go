  /api/v1/user-environment-access/{id}:
    get:
      tags: [User Environment Access]
      summary: Get user-environment access by ID
      security: [{ cookieAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/UUIDPathId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvironmentAccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [User Environment Access]
