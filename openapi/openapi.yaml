        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags: [Entities]
      summary: List entities
      security: [{ cookieAuth: [] }]
      parameters:
        - name: organization_id
          in: query
          required: true
          schema:
            type: string
